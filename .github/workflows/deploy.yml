name: 이글스데일리 페이지 배포

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: eagles-daily-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v4

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 홈페이지 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 홈페이지 배포
        id: deployment
        uses: actions/deploy-pages@v4
